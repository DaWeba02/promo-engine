services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_Password123}"
    ports:
      - "14333:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - SQLCMD=$$(find /opt/mssql-tools* -path '*/bin/sqlcmd' | head -n 1); [ -n "$$SQLCMD" ] && $$SQLCMD -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q 'SELECT 1' || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=PromoEngine;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Password123};TrustServerCertificate=True;Encrypt=False"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
